name: ci

on:
  push:
    branches:
      - main
      - 'feature/**'
      - '[0-9][0-9][0-9]-*'
  pull_request:

jobs:
  build-test:
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          unformatted=$(gofmt -l ./src ./tests)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race tests
        run: go test -race ./tests/unit/... ./tests/integration/... ./tests/contract/...

      - name: Benchmark smoke
        run: |
          WC_BENCH_TARGET=50000 go test ./tests/benchmark -run '^$' -bench BenchmarkPIDResolverLatency -benchmem -benchtime=1s
          WC_BENCH_TARGET=50000 go test ./tests/benchmark -run '^$' -bench BenchmarkLocalMessagingPerformance -benchmem -benchtime=1s
